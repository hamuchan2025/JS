<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>電卓</title>
   <link rel="stylesheet" href="denntaku.css">
</head>

<body>
    <a href="index.html" class="back">← TOPに戻る</a>
  <h1>電卓</h1>
  <main class="calc">
    <h1>Calculator</h1>

    <div class="screen">
      <div class="expr" id="expr"> </div>
      <div class="result" id="result">0</div>
    </div>

    <div class="keys">
      <button class="key gray" data-action="clear">C</button>
      <button class="key gray" data-action="back">⌫</button>
      <button class="key gray" data-action="percent">%</button>
      <button class="key op" data-op="/">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">＋</button>

      <button class="key wide" data-num="0">0</button>
      <button class="key" data-action="dot">.</button>
      <button class="key eq" data-action="equal">=</button>
    </div>

    <p class="hint">キーボード：数字 / + - * / / Enter(=) / Backspace(⌫) / Esc(C)</p>
  </main>

  <script src="dentaku.js"></script>
</body>
</html>
